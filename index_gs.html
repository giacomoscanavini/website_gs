<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Giacomo Scanavini</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Crimson+Pro:wght@300;400&family=DM+Mono:wght@300&display=swap" rel="stylesheet" />

  <style>
    :root {
      --black: #0d0d0d;
      --mid: #888;
      --light: #c8c8c8;
      --bg: #ffffff;
      --accent: #b5863a;
      --rule: #e4e4e4;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body {
      font-family: 'Crimson Pro', Georgia, serif;
      background: var(--bg);
      color: var(--black);
      font-weight: 300;
      -webkit-font-smoothing: antialiased;
    }

    header {
      max-width: 860px;
      margin: 0 auto;
      padding: 80px 40px 60px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: end;
      gap: 24px;
      opacity: 0;
      transform: translateY(16px);
      animation: fadeUp 0.7s ease forwards;
    }
    .site-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: clamp(2.8rem, 6vw, 4.6rem);
      font-weight: 300;
      letter-spacing: -0.01em;
      line-height: 1;
    }
    .site-name em { font-style: italic; color: var(--accent); }
    .header-meta {
      text-align: right;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--mid);
      line-height: 1.8;
    }

    .top-rule { max-width: 860px; margin: 0 auto; padding: 0 40px; }
    .top-rule hr { border: none; border-top: 1px solid var(--black); margin-bottom: 6px; }
    .top-rule .sub-rule { border-top: 1px solid var(--rule); }

    main { max-width: 860px; margin: 0 auto; padding: 0 40px 120px; }

    .category {
      margin-top: 64px;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 0.6s ease forwards;
    }
    .category-header {
      display: flex;
      align-items: baseline;
      gap: 20px;
      margin-bottom: 28px;
    }
    .category-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--mid);
      white-space: nowrap;
    }
    .category-line { flex: 1; height: 1px; background: var(--rule); }
    .category-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      color: var(--light);
    }

    .article-list { list-style: none; }
    .article-item { border-bottom: 1px solid var(--rule); }
    .article-item:first-child { border-top: 1px solid var(--rule); }

    .article-link {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: baseline;
      gap: 16px;
      padding: 18px 0;
      text-decoration: none;
      color: inherit;
      transition: padding-left 0.25s ease;
    }
    .article-link:hover { padding-left: 10px; }
    .article-link:hover .article-title { color: var(--accent); }
    .article-link::after {
      content: '↗';
      font-size: 0.75rem;
      color: var(--light);
      transition: color 0.2s ease, transform 0.2s ease;
      align-self: center;
    }
    .article-link:hover::after { color: var(--accent); transform: translate(2px, -2px); }

    .article-left { display: flex; flex-direction: column; gap: 4px; }
    .article-title {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 1.2rem;
      font-weight: 400;
      line-height: 1.3;
      transition: color 0.2s ease;
    }
    .article-pub {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--mid);
    }
    .article-date {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      color: var(--light);
      white-space: nowrap;
    }

    footer {
      max-width: 860px;
      margin: 0 auto;
      padding: 0 40px 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-name { font-family: 'Cormorant Garamond', serif; font-size: 0.95rem; font-style: italic; color: var(--light); }
    .footer-note { font-family: 'DM Mono', monospace; font-size: 0.58rem; letter-spacing: 0.1em; color: var(--light); text-transform: uppercase; }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 600px) {
      header { padding: 52px 24px 44px; grid-template-columns: 1fr; }
      .header-meta { text-align: left; }
      .top-rule, main { padding-left: 24px; padding-right: 24px; }
      footer { padding: 0 24px 48px; flex-direction: column; gap: 8px; align-items: flex-start; }
      .article-link { grid-template-columns: 1fr; }
      .article-date { display: none; }
    }
  </style>
</head>

    // ============================================================
    // 2. LOGIC — group and sort articles by category
    // ============================================================

    // Converts a date string like "Oct 2021", "2023", "Nov 2025" into
    // a numeric value (YYYYMM) so we can sort newest-first.
    function parseDateValue(dateStr) {
      const months = {
        Jan: 1, Feb: 2, Mar: 3, Apr: 4, May: 5, Jun: 6,
        Jul: 7, Aug: 8, Sep: 9, Oct: 10, Nov: 11, Dec: 12,
      };
      const parts = dateStr.trim().split(' ');
      if (parts.length === 2) {
        const month = months[parts[0]] || 0;
        const year  = parseInt(parts[1], 10);
        return year * 100 + month;         // e.g. Oct 2021 → 202110
      }
      return parseInt(parts[0], 10) * 100; // e.g. "2023" → 202300
    }

    function groupByCategory(articles) {
      const groups = {};
      for (const article of articles) {
        if (!groups[article.category]) {
          groups[article.category] = [];
        }
        groups[article.category].push(article);
      }

      // Sort each category's articles newest → oldest
      for (const key of Object.keys(groups)) {
        groups[key].sort(
          (a, b) => parseDateValue(b.date) - parseDateValue(a.date)
        );
      }

      return groups;
    }


    // ============================================================
    // 3. RENDER — turn data into HTML
    // ============================================================

    function renderArticle(article) {
      return `
        <li class="article-item">
          <a class="article-link" href="${article.url}" target="_blank" rel="noopener">
            <div class="article-left">
              <span class="article-title">${article.title}</span>
              <span class="article-pub">${article.publication}</span>
            </div>
            <span class="article-date">${article.date}</span>
          </a>
        </li>
      `;
    }

    function renderCategory(categoryName, articles, index) {
      const count = String(articles.length).padStart(2, '0');
      const articleRows = articles.map(renderArticle).join('');
      return `
        <section class="category" style="animation-delay: ${0.1 + index * 0.1}s">
          <div class="category-header">
            <span class="category-label">${categoryName}</span>
            <div class="category-line"></div>
            <span class="category-count">${count}</span>
          </div>
          <ul class="article-list">
            ${articleRows}
          </ul>
        </section>
      `;
    }

    function renderPage() {
      const groups = groupByCategory(articles);
      const container = document.getElementById('content');
      const html = Object.entries(groups)
        .map(([name, items], index) => renderCategory(name, items, index))
        .join('');
      container.innerHTML = html;
    }

    async function fetchPublications() {
      const section = document.getElementById('publications-section');
      try {
        const res = await fetch('./publications.json');
        if (res.ok) {
          const data = await res.json();
          const pubs = data.publications || [];
          if (pubs.length > 0) { renderPublicationsSection(section, pubs, 'Google Scholar'); return; }
        }
      } catch (_) {}
      renderPublicationsSection(section, publicationsData, 'Google Scholar');
    }

    // Shared renderer used by both sources
    function renderPublicationsSection(section, pubs, source) {
      pubs.sort((a, b) => parseDateValue(b.date) - parseDateValue(a.date));
      const count = String(pubs.length).padStart(2, '0');
      const rows  = pubs.map(renderArticle).join('');
      section.outerHTML = `
        <section class="category" style="animation-delay:0.2s">
          <div class="category-header">
            <span class="category-label">Research &amp; Publications</span>
            <div class="category-line"></div>
            <span class="category-count">${count}</span>
          </div>
          <ul class="article-list">${rows}</ul>
          <p style="font-family:'DM Mono',monospace;font-size:0.55rem;
            letter-spacing:0.08em;color:#c8c8c8;margin-top:14px;">
            Source: ${source}</p>
        </section>
      `;
    }
